name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dev dependencies
        run: pip install -e ".[dev]"

      - name: Lint (ruff)
        run: ruff check packages tests

      - name: Type-check (mypy --strict)
        run: mypy packages/feature-engine/src packages/backtest/src packages/risk-engine/src packages/strategy-engine/src

      - name: Tests (pytest)
        run: pytest -q
